<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Govt Polytechnic Leh</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.navbar a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  transition: 0.3s;
}
.navbar a:hover {
  color: #90e0ef;
}

/* HERO HEADER */
.header {
  height: 250px;
  background: linear-gradient(rgba(0,119,182,0.7), rgba(2,62,138,0.8)),
              url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.header h1 {
  font-size: 40px;
}
.header p {
  opacity: 0.9;
}

/* MAIN */
.container {
  display: flex;
  gap: 30px;
  padding: 50px 20px;
  justify-content: center;
  flex-wrap: wrap;
}

/* GLASS CARD */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 25px;
  width: 350px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  color: #000;
}

/* FORM */
.form-group {
  position: relative;
  margin-bottom: 20px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
  background: rgba(255,255,255,0.8);
}

.form-group label {
  position: absolute;
  top: -8px;
  left: 10px;
  background: white;
  padding: 0 5px;
  font-size: 12px;
  color: #0077b6;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #0077b6, #00b4d8);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  transform: scale(1.05);
}

/* INFO */
.info p {
  margin: 10px 0;
}

.info i {
  margin-right: 10px;
  color: #0077b6;
}

/* MAP */
.map iframe {
  width: 100%;
  border-radius: 10px;
  margin-top: 15px;
}

/* SUCCESS */
.success {
  color: green;
  text-align: center;
  margin-top: 10px;
}

/* FOOTER */
.footer {
  background: #023e8a;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}

/* RESPONSIVE */
@media(max-width: 768px){
  .container {
    flex-direction: column;
    align-items: center;
  }
}
</style>

  <link rel="stylesheet" href="./style/main.css">
  <link rel="stylesheet" href="./style/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Hide old navbars and footers to show new ones */
    header, .main-nav, .navbar, footer, .footer { display: none !important; }
    /* Give spacing for new navbar */
    body { padding-top: 80px; }
  </style>
  <script src="./components.js" defer></script>
</head>

<body style="background-color: var(--light); font-family: 'Inter', sans-serif;">
  <app-navbar base="./"></app-navbar>
  <main class="page-content">

<!-- NAVBAR -->
<div class="navbar">
  <h3>GPC Leh</h3>
  <div>
    <a href="index.html">Home</a>
    <a href="course.html">Courses</a>
    <a href="admission.html">Admission</a>
    <a href="contact.html">Contact</a>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Contact Us</h1>
  <p>We’d love to hear from you</p>
</div>

<!-- MAIN -->
<div class="container">

  <!-- FORM -->
  <div class="card">
    <h3>Send Message</h3>

    <form id="contactForm">

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="message" rows="4" required></textarea>
      </div>

      <button type="submit">Send Message</button>
      <p class="success" id="successMsg"></p>
    </form>
  </div>

  <!-- INFO -->
  <div class="card info">
    <h3>College Info</h3>
    <p><i class="fas fa-map-marker-alt"></i> Govt Polytechnic College Leh, Ladakh</p>
    <p><i class="fas fa-phone"></i> +91 962268876</p>
    <p><i class="fas fa-envelope"></i> govtpolylehutl@gmail.com</p>
    <p><i class="fas fa-clock"></i> Mon - Fri (10 AM - 4 PM)</p>

    <div class="map">
      <iframe src="https://www.google.com/maps?q=Govt+Polytechnic+College+Leh&output=embed"></iframe>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <p>© 2027 Govt Polytechnic College Leh | Designed with ❤️</p>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value.trim();
  let message = document.getElementById("message").value.trim();

  if(name.length < 3){
    alert("Enter valid name");
    return;
  }

  if(message.length < 10){
    alert("Message should be at least 10 characters");
    return;
  }

  document.getElementById("successMsg").innerText =
    "✅ Message sent successfully!";

  document.getElementById("contactForm").reset();
});
</script>

  </main>
  <app-footer base="./"></app-footer>
</body>
</html>
