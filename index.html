/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  background: #0077b6;
  padding: 10px;
  color: white;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}

.navbar a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
}

.navbar a:hover {
  text-decoration: underline;
}

/* HERO SLIDER */
.hero {
  position: relative;
  height: 300px;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.active {
  display: block;
}

/* SECTION */
.section {
  padding: 40px;
  text-align: center;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 250px;
  padding: 20px;
  background: #f1f1f1;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  background: #caf0f8;
}

/* NOTICE BOARD */
.notice {
  background: #ffd166;
  padding: 10px;
  overflow: hidden;
  white-space: nowrap;
}

.notice p {
  display: inline-block;
  animation: scroll 10s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}


/* FOOTER */
.footer {
  background: #023e8a;
  color: white;
  padding: 20px;
  text-align: center;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .cards {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>

<script>
// SLIDER SCRIPT
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide() {
  slides.forEach(slide => slide.classList.remove("active"));
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}

setInterval(showSlide, 3000);
</script>
